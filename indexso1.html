<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ĐỀ ÔN TN THPT (ĐỀ SỐ 1) - THPT TRẦN HƯNG ĐẠO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;700;800&family=Montserrat:wght@700;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --dark-navy: #020617;
            --slate: #0f172a;
            --electric-blue: #3b82f6;
            --cyan: #22d3ee;
            --crimson: #fb7185;
            --emerald: #34d399;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --glass: rgba(30, 41, 59, 0.7);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; transition: all 0.2s ease; }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Be Vietnam Pro', sans-serif;
            background-color: var(--dark-navy);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Hình nền AI và Công nghệ chìm */
        .ai-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            opacity: 0.4;
            background-image: 
                radial-gradient(circle at 2px 2px, rgba(59, 130, 246, 0.15) 1px, transparent 0),
                linear-gradient(to right, rgba(59, 130, 246, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(59, 130, 246, 0.05) 1px, transparent 1px);
            background-size: 40px 40px, 80px 80px, 80px 80px;
        }

        /* Biểu tượng AI chìm chính giữa */
        .ai-watermark {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            font-size: 40vw;
            color: var(--electric-blue);
            opacity: 0.03;
            pointer-events: none;
            filter: blur(2px);
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            background: var(--slate);
            position: relative;
            display: none;
            flex-direction: column;
            overflow-x: hidden;
            z-index: 1;
            box-shadow: 0 0 100px rgba(0,0,0,0.8);
            border-left: 1px solid rgba(59, 130, 246, 0.2);
            border-right: 1px solid rgba(59, 130, 246, 0.2);
        }

        .active { display: flex; }

        header {
            padding: 25px 20px;
            background: rgba(2, 6, 23, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 3px solid var(--electric-blue);
            text-align: center;
            z-index: 10;
        }
        .school-info { font-size: 11px; letter-spacing: 2px; color: var(--cyan); font-weight: 800; margin-bottom: 8px; text-transform: uppercase; }
        .title-main { font-family: 'Montserrat', sans-serif; font-size: 22px; font-weight: 900; letter-spacing: -0.5px; text-transform: uppercase; line-height: 1.1; color: #fff; }

        /* Login Card */
        #slide-start { padding: 40px 20px; text-align: center; justify-content: center; }
        .login-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            padding: 35px 25px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 1;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        .input-group { margin-bottom: 25px; text-align: left; }
        label { display: block; font-size: 11px; font-weight: 700; color: var(--cyan); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        input {
            width: 100%; background: rgba(2, 6, 23, 0.6); border: 2px solid #334155; padding: 16px; color: white;
            font-size: 16px; border-radius: 12px; font-family: inherit;
        }
        input:focus { border-color: var(--electric-blue); outline: none; box-shadow: 0 0 15px rgba(59, 130, 246, 0.3); }

        .btn {
            width: 100%; padding: 18px; background: linear-gradient(135deg, var(--electric-blue), #2563eb); color: white; border: none;
            font-weight: 800; font-size: 16px; text-transform: uppercase; border-radius: 12px;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.4);
        }
        .btn:active { transform: scale(0.97); }

        /* Quiz UI */
        .quiz-content { flex: 1; padding: 25px 20px; z-index: 1; overflow-y: auto; position: relative; }
        .q-meta { font-weight: 800; color: var(--cyan); font-size: 13px; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .q-text { font-size: 17px; font-weight: 700; line-height: 1.5; margin-bottom: 20px; color: #fff; }

        .code-snippet {
            background: #020617;
            padding: 15px;
            border-radius: 10px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            margin-bottom: 20px;
            border: 1px solid #1e293b;
            color: #a5f3fc;
            white-space: pre;
            overflow-x: auto;
            position: relative;
        }
        .code-snippet::before {
            content: "SYSTEM_CODE";
            position: absolute; top: 2px; right: 10px;
            font-size: 9px; color: #334155; letter-spacing: 1px;
        }

        .option-grid { display: flex; flex-direction: column; gap: 12px; }
        .option-card {
            background: rgba(30, 41, 59, 0.4); border: 2px solid rgba(255,255,255,0.05); padding: 16px; border-radius: 15px;
            display: flex; align-items: center; cursor: pointer; backdrop-filter: blur(5px);
        }
        .option-card:hover { background: rgba(59, 130, 246, 0.1); border-color: rgba(59, 130, 246, 0.3); }
        .option-card.correct { border-color: var(--emerald); background: rgba(52, 211, 153, 0.1); color: var(--emerald); font-weight: 800; }
        .option-card.wrong { border-color: var(--crimson); background: rgba(251, 113, 133, 0.1); color: var(--crimson); }
        .opt-idx { width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; background: rgba(15, 23, 42, 0.8); border-radius: 8px; margin-right: 15px; font-weight: 800; color: var(--cyan); font-size: 14px; flex-shrink: 0; }

        /* TF UI */
        .tf-box { background: rgba(15, 23, 42, 0.6); padding: 15px; border-radius: 15px; margin-bottom: 15px; border-left: 5px solid var(--electric-blue); backdrop-filter: blur(5px); }
        .tf-statement { font-size: 14px; margin-bottom: 12px; font-weight: 600; color: #cbd5e1; line-height: 1.4; }
        .tf-btns { display: flex; gap: 10px; }
        .tf-btn { flex: 1; padding: 14px; border: 2px solid #334155; background: rgba(30, 41, 59, 0.8); color: white; font-weight: 800; border-radius: 10px; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .tf-btn.s-true { background: var(--emerald); border-color: var(--emerald); }
        .tf-btn.s-false { background: var(--crimson); border-color: var(--crimson); }

        .explanation { margin-top: 20px; padding: 18px; background: rgba(2, 6, 23, 0.85); border: 1px dashed var(--cyan); border-radius: 12px; font-size: 13px; line-height: 1.6; display: none; color: #94a3b8; }

        .progress-container { height: 6px; width: 100%; background: #1e293b; position: sticky; top: 0; z-index: 20; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, var(--electric-blue), var(--cyan)); width: 0%; box-shadow: 0 0 20px var(--cyan); }

        .result-view { text-align: center; padding: 50px 25px; }
        .score-circle { width: 180px; height: 180px; border-radius: 50%; border: 10px solid var(--electric-blue); margin: 20px auto; display: flex; flex-direction: column; justify-content: center; background: rgba(2, 6, 23, 0.5); box-shadow: 0 0 40px rgba(59, 130, 246, 0.3); }
        .score-val { font-family: 'Montserrat', sans-serif; font-size: 55px; font-weight: 900; color: var(--cyan); line-height: 1; }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--slate); }
        ::-webkit-scrollbar-thumb { background: var(--electric-blue); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="ai-background"></div>
    <div class="ai-watermark"><i class="fas fa-microchip"></i></div>

    <!-- MÀN HÌNH BẮT ĐẦU -->
    <div class="app-container active" id="slide-start">
        <header>
            <div class="school-info">THPT TRẦN HƯNG ĐẠO</div>
            <div class="title-main">ĐỀ ÔN TẬP TN THPT<br><span style="color:var(--cyan)">(LẦN 1 - 2026)</span></div>
        </header>
        <div class="quiz-content" style="display: flex; flex-direction: column; justify-content: center;">
            <div class="login-card">
                <div class="input-group">
                    <label>Họ tên thí sinh</label>
                    <input type="text" id="userName" placeholder="Nhập tên em...">
                </div>
                <div class="input-group">
                    <label>Số báo danh (SBD)</label>
                    <input type="text" id="userClass" placeholder="Nhập SBD...">
                </div>
                <button class="btn" onclick="startApp(false)">BẮT ĐẦU LÀM BÀI <i class="fas fa-terminal"></i></button>
            </div>
            <p style="margin-top: 30px; font-size: 10px; color: var(--text-dim); text-transform: uppercase; font-weight: 800; text-align: center; letter-spacing: 2px;">
                <i class="fas fa-brain"></i> Powered by Tin Học THPT
            </p>
        </div>
    </div>

    <!-- MÀN HÌNH LÀM BÀI -->
    <div class="app-container" id="slide-quiz">
        <div class="progress-container"><div class="progress-bar" id="p-bar"></div></div>
        <header style="padding: 15px; background: rgba(2, 6, 23, 0.95);">
            <div id="part-label" style="font-size: 11px; color: var(--cyan); font-weight: 800; letter-spacing: 2px;">PHẦN I: TRẮC NGHIỆM</div>
        </header>
        <div class="quiz-content" id="quiz-main"></div>
        <footer style="padding: 20px; background: rgba(2, 6, 23, 0.9);">
            <button class="btn" id="next-btn" style="display: none; background: var(--emerald); box-shadow: 0 4px 20px rgba(52, 211, 153, 0.4);" onclick="handleNext()">TIẾP THEO <i class="fas fa-chevron-right"></i></button>
        </footer>
    </div>

    <!-- MÀN HÌNH KẾT QUẢ -->
    <div class="app-container" id="slide-result">
        <div class="quiz-content result-view">
            <h2 class="title-main" style="color: var(--cyan)">HOÀN THÀNH</h2>
            <p id="res-info" style="margin-top: 10px; font-weight: 700; color: var(--text-dim);"></p>
            <div class="score-circle">
                <div class="score-val" id="res-score">0.0</div>
                <div style="font-size: 11px; font-weight: 800; color: var(--text-dim); letter-spacing: 1px;">SCORE</div>
            </div>
            <div style="background: rgba(15, 23, 42, 0.6); padding: 20px; border-radius: 20px; margin-bottom: 30px; border: 1px solid rgba(255,255,255,0.05);">
                <p style="font-size: 16px; margin: 0;">Đúng: <span id="res-correct" style="color:var(--emerald); font-weight:800;">0</span> / <span id="res-total">0</span></p>
                <div id="res-msg" style="margin-top: 15px; font-size: 14px; font-weight: 800; color: var(--cyan);"></div>
            </div>
            <button class="btn" style="background: transparent; border: 2px solid var(--electric-blue); color: var(--electric-blue); box-shadow: none;" onclick="startApp(true)">
                <i class="fas fa-sync-alt"></i> LÀM LẠI BÀI TẬP (ĐẢO CÂU)
            </button>
        </div>
    </div>

    <script>
        const part1DB = [
            { q: "Đặc trưng nào sau đây KHÔNG là một trong những đặc trưng cơ bản của AI?", options: ["Khả năng suy luận.", "Khả năng học.", "Khả năng vận động.", "Khả năng nhận thức."], correct: 2, expl: "AI tập trung vào tư duy kỹ thuật số. Vận động cơ học thuần túy thuộc về lĩnh vực Robotics phần cứng." },
            { 
                q: "Cho đoạn mã HTML như sau:", 
                code: '<ol start ="10">\n    <li>Khoa học tự nhiên</li>\n    <li>Khoa học xã hội</li>\n</ol>', 
                options: ["Đoạn lệnh trên bị sai cú pháp.", "Đoạn lệnh trên tạo một danh sách có thứ tự gồm hai phần tử.", "Các phần tử được đánh số 10 và 11.", "Kiểu đánh số là 1, 2, 3."], 
                correct: 0, 
                expl: "Cú pháp <ol start='10'> là hoàn toàn đúng tiêu chuẩn để bắt đầu đánh số tại giá trị cụ thể." 
            },
            { q: "Phát biểu nào sau đây nêu đúng nhiệm vụ chính của người làm nghề quản trị mạng?", options: ["Phát triển các ứng dụng di động.", "Lập kế hoạch truyền thông cho tổ chức.", "Thực hiện khảo sát về nhu cầu của khách hàng.", "Quản lí và duy trì hệ thống mạng máy tính của tổ chức."], correct: 3, expl: "Quản trị mạng đảm bảo hạ tầng kết nối hoạt động thông suốt và an toàn." },
            { q: "Tôn trọng quyền riêng tư, không phát tán thông tin người khác... thể hiện khía cạnh nào khi ứng xử nhân văn trên mạng?", options: ["Lịch sự.", "Tôn trọng.", "Hỗ trợ.", "Thấu hiểu."], correct: 1, expl: "Đây là biểu hiện cốt lõi của sự Tôn trọng cá nhân trên không gian mạng." },
            { q: "Công việc chính của nghề sửa chữa và bảo trì máy tính liên quan đến vấn đề nào?", options: ["Sản xuất linh kiện máy tính.", "Xây dựng các hệ thống mới từ đầu.", "Duy trì sự ổn định của phần cứng và phần mềm của máy tính.", "Thiết kế giao diện người dùng."], correct: 2, expl: "Bảo trì tập trung vào việc duy trì hệ thống hiện có hoạt động ổn định." },
            { 
                q: "Giả sử có một đoạn văn bản có mã HTML như sau:", 
                code: '<style>\n  p { font-size: 2em; }\n  em { font-size: 50%; }\n</style>\n<h1> Tiêu đề trang </h1>\n<p> Đây là văn bản <em> rất đặc biệt </em> </p>', 
                options: ["Có cỡ chữ bằng 100% của phần tử gốc của văn bản.", "Có cỡ chữ bằng 50% mặc định trình duyệt.", "Có cỡ chữ bằng 200% mặc định trình duyệt.", "Có cỡ chữ bằng cỡ chữ mặc định của trình duyệt."], 
                correct: 3, 
                expl: "p là 2em (200%), em là 50% của p (50% * 200% = 100%). 100% bằng cỡ chữ mặc định." 
            },
            { q: "Phần tử gốc của cây HTML là phần tử nào dưới đây?", options: ["<head>.", "<style>.", "<body>.", "<html>."], correct: 3, expl: "<html> là gốc của tài liệu, bao bọc toàn bộ mã nguồn web." },
            { 
                q: "Giả sử có mẫu định dạng CSS như sau:", 
                code: '<style>\n  p { color: blue; }\n  * { color: green; }\n  p { color: magenta; }\n</style>', 
                options: ["Màu xanh dương.", "Màu hồng.", "Màu xanh lá cây.", "Màu mặc định của trình duyệt."], 
                correct: 1, 
                expl: "Selector 'p' ưu tiên cao hơn '*'. Lệnh p sau cùng (magenta) ghi đè lệnh p trước đó." 
            },
            { q: "Né tránh giao lưu với người tôn giáo khác trên diễn đàn là vi phạm việc nào?", options: ["Đối xử như nhau đối với mọi sắc tộc, tôn giáo.", "Bắt nạt, quấy rối trên mạng.", "Đồng cảm với những người gặp khó khăn.", "Sử dụng từ ngữ tục tĩu, cá biệt."], correct: 0, expl: "Ứng xử nhân văn yêu cầu bình đẳng, không phân biệt sắc tộc và tôn giáo." },
            { q: "Wi-Fi thuộc loại mạng nào dưới đây?", options: ["Mạng cục bộ.", "Mạng diện rộng.", "Mạng cục bộ không dây.", "Mạng LAN."], correct: 2, expl: "Wi-Fi là công nghệ Wireless Local Area Network (WLAN)." },
            { q: "Để tạo một bảng có 4 hàng, 3 cột ta cần sử dụng bao nhiêu thẻ?", options: ["3 thẻ tr, 4 thẻ th và 12 thẻ td.", "3 thẻ tr và 12 thẻ td.", "4 thẻ tr, 3 thẻ th và 12 thẻ td.", "4 thẻ tr và 12 thẻ td."], correct: 3, expl: "Mỗi hàng là 1 <tr> (4 hàng), mỗi ô dữ liệu là 1 <td> (4x3 = 12 ô)." },
            { 
                q: "Có thể dùng thẻ hay thuộc tính nào dưới đây để viết hoa tất cả các kí tự trong một đoạn văn bản?", 
                options: ['style="text-transform: uppercase;"', "<uppercase>.", "<caps>.", 'style="text-uppercase".'], 
                correct: 0, 
                expl: "text-transform: uppercase là thuộc tính CSS chuẩn để viết hoa toàn bộ văn bản." 
            },
            { q: "Ý nghĩa đúng của thuật ngữ 'Wireless Access Point'?", options: ["Cách gọi hub không dây.", "Thiết bị mà từ đó các thiết bị hỗ trợ truy cập không dây có thể truy cập vào mạng.", "Tên riêng trong tiếng Anh.", "Cách gọi switch không dây."], correct: 1, expl: "WAP là điểm thu phát sóng cho thiết bị không dây truy cập vào mạng có dây." },
            { q: "Thiết bị nào sau đây được tích hợp trợ lí ảo?", options: ["Điện thoại cảm ứng.", "Máy tính cầm tay.", "Máy quét mã vạch.", "Chuông báo cháy."], correct: 0, expl: "Smartphone hiện đại luôn tích hợp trợ lý ảo (Siri, Google Assistant...)." },
            { q: "Modem có chức năng gì trong mạng máy tính?", options: ["Điều khiển truy cập mạng.", "Lưu trữ dữ liệu.", "Chuyển đổi tín hiệu từ tín hiệu số thành tín hiệu tương tự và ngược lại.", "Kết nối các máy tính trong mạng nội bộ."], correct: 2, expl: "Modem thực hiện việc điều chế và giải điều chế tín hiệu để truyền dữ liệu." },
            { q: "Phương án nào nêu đúng ba phương án thiết lập CSS?", options: ["CSS riêng, CSS ngoài và CSS nội tuyến.", "CSS trong, CSS ngoài và CSS nội tuyến.", "CSS riêng, CSS chung và CSS nội tuyến.", "CSS trong, CSS ngoài và CSS nội dung."], correct: 1, expl: "Ba cách là Internal (trong), External (ngoài) và Inline (nội tuyến)." },
            { q: "Trao đổi dữ liệu trong mạng cục bộ tuân thủ giao thức nào?", options: ["DNS.", "SMTP.", "Ethernet.", "TCP/IP"], correct: 2, expl: "Ethernet là chuẩn phổ biến nhất tại tầng vật lý và liên kết dữ liệu cho LAN." },
            { q: "Cách nào giúp tránh thông tin sai lệch khi đăng bài lên mạng xã hội?", options: ["Không cần kiểm tra nguồn tin.", "Đăng ngay lập tức.", "Đọc kĩ, kiểm tra nội dung.", "Chia sẻ mọi tin nhanh nhất."], correct: 2, expl: "Kiểm chứng là khâu quan trọng nhất để chống tin giả và hiểu lầm." },
            { 
                q: "Sau khi thực hiện lệnh sau, biến s2 sẽ có kết quả là gì?", 
                code: 's1 = "3986443"\ns2 = ""\nfor ch in s1:\n    if int(ch) % 2 == 0:\n        s2 = s2 + ch\nprint(s2)',
                options: ["39864.", "3986443.", "8644.", "443."], 
                correct: 2, 
                expl: "Python lọc các ký tự là số chẵn từ chuỗi: 8, 6, 4, 4." 
            },
            { 
                q: "Câu lệnh nào sau đây tạo một nút gửi trong biểu mẫu?", 
                options: ['<input type="reset">.', '<output type="submit">.', '<button type="button">.', '<button type="submit">.'], 
                correct: 3, 
                expl: "button hoặc input có type='submit' dùng để gửi dữ liệu form." 
            },
            { q: "Để chèn tệp ảnh vào trang web trong HTML, ta sử dụng thẻ nào?", options: ["<jpg>.", "<img>.", "<png>.", "<images>."], correct: 1, expl: "Thẻ <img> viết tắt của Image." },
            { q: "Lĩnh vực nào chưa thể ứng dụng AI một cách rộng rãi?", options: ["Sản xuất công nghiệp.", "Huấn luyện động vật làm xiếc.", "Phân tích thị trường.", "Nông nghiệp thông minh."], correct: 1, expl: "Sinh vật sống có hành vi phức tạp, đòi hỏi tương tác vật lý/cảm xúc AI chưa đáp ứng được." },
            { q: "Nguy cơ cần cảnh báo khi phát triển AI?", options: ["Áp lực thất nghiệp; Ảnh hưởng quyền ưu tiên; Minh bạch; An toàn.", "Áp lực kinh tế; Quyền riêng tư; Minh bạch; An toàn.", "Áp lực thất nghiệp; Quyền riêng tư; Minh bạch; An toàn.", "Áp lực thất nghiệp; Quyền riêng tư; Thiếu chuyên nghiệp; An ninh."], correct: 2, expl: "Đạo đức AI gồm: Thất nghiệp, Riêng tư, Minh bạch và An toàn." },
            { q: "Kiến thức nào quan trọng nhất cho người quản trị mạng?", options: ["Biết sử dụng MXH an toàn.", "Biết cài đặt cấu hình máy tính.", "Nắm được cấu trúc và hoạt động của mạng máy tính.", "Hiểu biết về lập trình phần mềm."], correct: 2, expl: "Phải hiểu hạ tầng mạng mới có thể quản trị hệ thống." }
        ];

        const part2DB = [
            { 
                q: "Về các loại mạng máy tính (LAN, MAN, Wi-Fi):", 
                sub: [
                    { t: "MAN là loại mạng có số lượng máy trạm nhỏ hơn so với mạng LAN.", a: false },
                    { t: "Mạng LAN còn được gọi là Mạng cục bộ hay Mạng nội bộ.", a: true },
                    { t: "Khi chưa có Wi-Fi, các máy trạm phải dùng dây mạng để kết nối.", a: true },
                    { t: "Phòng thực hành 40 máy PC trường học thuộc loại mạng MAN.", a: false }
                ],
                expl: "Mạng đô thị MAN lớn hơn LAN. Phòng máy trường học là LAN."
            },
            { 
                q: "Về CSDL Quản lý nhân sự (CANBO, PHONG, TRINHDOHOCVAN):", 
                sub: [
                    { t: "Trong mô hình quan hệ, dữ liệu được thể hiện trong các hàng.", a: true },
                    { t: "MaPh là khóa chính của bảng CANBO.", a: false },
                    { t: "Thêm cán bộ mới cần nhập vào bảng CANBO và TRINHDOHOCVAN.", a: true },
                    { t: "Để biết địa chỉ phòng của cán bộ cần bảng CANBO và TRINHDOHOCVAN.", a: false }
                ],
                expl: "Tên và địa chỉ phòng nằm ở bảng PHONG. MaPh ở CANBO là khóa ngoài."
            },
            {
                q: "Về CSDL Quản lý điểm QLDIEM:",
                sub: [
                    { t: "Dùng SQL: SELECT * FROM diem WHERE idHocsinh = 3 lọc điểm học sinh ID 3.", a: true },
                    { t: "Có thể nhập điểm trước khi nhập dữ liệu học sinh vào bảng hocsinh.", a: false },
                    { t: "Câu lệnh SQL JOIN 3 bảng để lấy điểm trung bình là đúng logic.", a: true },
                    { t: "Cần thêm trường mới vào bảng hocsinh để lưu kết quả trung bình chung.", a: false }
                ],
                expl: "Không nên lưu dữ liệu tính toán được vào bảng. Phải có học sinh trước mới có điểm."
            },
            {
                q: "Về thiết kế trang web đặc sản địa phương:",
                sub: [
                    { t: "Mỗi sản phẩm trang danh sách cần siêu liên kết dẫn đến bài chi tiết.", a: true },
                    { t: "Cần nút điều hướng trái/phải trong thanh trượt hình ảnh (slider).", a: true },
                    { t: "Khi thêm ảnh vào web, kích thước hiển thị không thể thay đổi được.", a: false },
                    { t: "Sau khi hoàn thành có thể xuất bản website ra địa chỉ Internet.", a: true }
                ],
                expl: "Kích thước ảnh thay đổi được bằng thuộc tính width/height trong CSS/HTML."
            }
        ];

        let state = { questions: [], currentIdx: 0, score: 0, correctCount: 0, user: { name: '', class: '' }, tfBuffer: [] };

        function playSound(isCorrect) {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            osc.frequency.setValueAtTime(isCorrect ? 800 : 250, ctx.currentTime);
            if (isCorrect) osc.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.1);
            else osc.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + 0.2);
            gain.gain.setValueAtTime(0.06, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
            osc.start(); osc.stop(ctx.currentTime + 0.3);
        }

        function startApp(shouldShuffle) {
            if (!shouldShuffle) {
                const name = document.getElementById('userName').value;
                const cls = document.getElementById('userClass').value;
                if (!name || !cls) { alert("Em hãy nhập đủ Họ tên và SBD nhé!"); return; }
                state.user = { name, class: cls };
            }

            let p1 = [...part1DB].map(q => ({...q, type: 'mcq'}));
            let p2 = [...part2DB].map(q => ({...q, type: 'tf'}));

            if (shouldShuffle) {
                p1 = p1.sort(() => Math.random() - 0.5);
                p2 = p2.sort(() => Math.random() - 0.5);
            }

            state.questions = [...p1, ...p2];
            state.currentIdx = 0; 
            state.score = 0; 
            state.correctCount = 0;
            
            showSlide('slide-quiz');
            renderQuestion();
        }

        function showSlide(id) {
            document.querySelectorAll('.app-container').forEach(c => c.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function renderQuestion() {
            const q = state.questions[state.currentIdx];
            const main = document.getElementById('quiz-main');
            const nextBtn = document.getElementById('next-btn');
            const pBar = document.getElementById('p-bar');
            const label = document.getElementById('part-label');

            nextBtn.style.display = 'none';
            pBar.style.width = `${(state.currentIdx / state.questions.length) * 100}%`;
            label.innerText = q.type === 'mcq' ? "PHẦN I: TRẮC NGHIỆM" : "PHẦN II: ĐÚNG / SAI";

            let html = `<div class="q-meta">CÂU HỎI ${state.currentIdx + 1} / ${state.questions.length}</div><div class="q-text">${q.q}</div>`;
            if (q.code) html += `<div class="code-snippet">${escapeHtml(q.code)}</div>`;

            if (q.type === 'mcq') {
                html += `<div class="option-grid">`;
                q.options.forEach((opt, i) => {
                    html += `<div class="option-card" onclick="handleMCQ(${i}, this)"><div class="opt-idx">${String.fromCharCode(65+i)}</div><div>${escapeHtml(opt)}</div></div>`;
                });
                html += `</div>`;
            } else {
                state.tfBuffer = new Array(q.sub.length).fill(null);
                q.sub.forEach((sub, i) => {
                    html += `<div class="tf-box"><div class="tf-statement">${sub.t}</div><div class="tf-btns">
                        <button class="tf-btn" id="tf-${i}-true" onclick="handleTF(${i}, true)">ĐÚNG</button>
                        <button class="tf-btn" id="tf-${i}-false" onclick="handleTF(${i}, false)">SAI</button>
                    </div></div>`;
                });
            }
            html += `<div class="explanation" id="expl"><strong><i class="fas fa-info-circle"></i> GIẢI THÍCH:</strong><br>${q.expl}</div>`;
            main.innerHTML = html;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function handleMCQ(idx, el) {
            const q = state.questions[state.currentIdx];
            const cards = document.querySelectorAll('.option-card');
            cards.forEach(c => c.onclick = null);
            if (idx === q.correct) { el.classList.add('correct'); playSound(true); state.correctCount++; }
            else { el.classList.add('wrong'); cards[q.correct].classList.add('correct'); document.getElementById('expl').style.display = 'block'; playSound(false); }
            document.getElementById('next-btn').style.display = 'flex';
        }

        function handleTF(idx, val) {
            const q = state.questions[state.currentIdx];
            const actual = q.sub[idx].a;
            const bT = document.getElementById(`tf-${idx}-true`), bF = document.getElementById(`tf-${idx}-false`);
            bT.disabled = bF.disabled = true;
            if (val === actual) { document.getElementById(`tf-${idx}-${val}`).classList.add(`s-${val}`); playSound(true); state.tfBuffer[idx] = true; }
            else { document.getElementById(`tf-${idx}-${val}`).classList.add(`s-${val}`); document.getElementById(`tf-${idx}-${actual}`).style.border = "2px solid var(--emerald)"; document.getElementById('expl').style.display = 'block'; playSound(false); state.tfBuffer[idx] = false; }
            if (state.tfBuffer.every(v => v !== null)) {
                const correctSubs = state.tfBuffer.filter(v => v === true).length;
                if (correctSubs === q.sub.length) state.correctCount++;
                document.getElementById('next-btn').style.display = 'flex';
            }
        }

        function handleNext() {
            state.currentIdx++;
            if (state.currentIdx < state.questions.length) renderQuestion();
            else showResults();
        }

        function showResults() {
            const finalScore = ((state.correctCount / state.questions.length) * 10).toFixed(1);
            document.getElementById('res-info').innerText = `${state.user.name} | SBD: ${state.user.class}`;
            document.getElementById('res-score').innerText = finalScore;
            document.getElementById('res-correct').innerText = state.correctCount;
            document.getElementById('res-total').innerText = state.questions.length;
            let msg = finalScore >= 8 ? "XUẤT SẮC! TIẾP TỤC PHÁT HUY" : finalScore >= 5 ? "TẠM ỔN, HÃY ÔN TẬP KỸ HƠN" : "CỐ GẮNG ÔN TẬP KỸ HƠN NHÉ!";
            document.getElementById('res-msg').innerText = msg;
            showSlide('slide-result');
        }
    </script>
</body>
</html>
